<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureTask — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h1>Secure<span>Task</span></h1>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Error banner -->
      <div class="auth-error" id="auth-error"></div>

      <!-- Login Form -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button class="btn btn-primary" type="submit" id="login-btn">Sign In</button>
      </form>

      <!-- Register Form -->
      <form id="form-register" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Jane Smith" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary" type="submit" id="register-btn">Create Account</button>
      </form>

    </div>
  </div>

  <script>
    // Redirect if already authenticated
    if (sessionStorage.getItem('jwt_token')) {
      window.location.href = 'index.html';
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').style.display    = isLogin ? '' : 'none';
      document.getElementById('form-register').style.display = isLogin ? 'none' : '';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('auth-error').style.display = 'none';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait…' : (btnId === 'login-btn' ? 'Sign In' : 'Create Account');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      setLoading('login-btn', true);
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('login-email').value.trim(),
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Invalid credentials');
        sessionStorage.setItem('jwt_token', data.access_token);
        sessionStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading('login-btn', false);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideError();
      setLoading('register-btn', true);
      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name:     document.getElementById('reg-name').value.trim(),
            email:    document.getElementById('reg-email').value.trim(),
            password: document.getElementById('reg-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Registration failed');
        sessionStorage.setItem('jwt_token', data.access_token);
        sessionStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading('register-btn', false);
      }
    }
  </script>
</body>
</html>
