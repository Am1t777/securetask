<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureTask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>
<div class="app">

  <!-- ── Top Bar ─────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Secure<span>Task</span>
    </div>
    <div class="topbar-divider"></div>
    <select class="project-select" id="project-select" onchange="onProjectChange()">
      <option value="">Loading projects…</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="openNewProjectModal()">+ Project</button>
    <div class="topbar-actions">
      <div class="user-badge">
        <div class="user-dot"></div>
        <span id="user-name">—</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
    </div>
  </header>

  <div class="main">

    <!-- ── Sidebar ──────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Task Status</div>
        <canvas class="sidebar-chart" id="status-chart"></canvas>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Overview</div>
        <div class="stat-row">
          <span class="stat-label">Backlog</span>
          <span class="stat-badge badge-backlog" id="cnt-backlog">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">To Do</span>
          <span class="stat-badge badge-todo" id="cnt-todo">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">In Progress</span>
          <span class="stat-badge badge-progress" id="cnt-progress">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Done</span>
          <span class="stat-badge badge-done" id="cnt-done">0</span>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-label" style="margin-bottom:6px">Connection</div>
        <div id="socket-status" style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">
          <div style="width:7px;height:7px;border-radius:50%;background:var(--muted)" id="socket-dot"></div>
          Disconnected
        </div>
      </div>
    </aside>

    <!-- ── Board ────────────────────────────────────────────── -->
    <section class="board-wrapper">
      <div class="board-header">
        <h2 class="board-title" id="board-title">Select a project</h2>
        <button class="btn btn-primary btn-sm" id="new-task-btn" onclick="openNewTaskModal()" style="display:none">
          + New Task
        </button>
      </div>

      <div class="board" id="board">
        <!-- columns injected by JS -->
      </div>
    </section>

  </div>
</div>

<!-- ── Task Modal ──────────────────────────────────────────────── -->
<div class="modal-backdrop" id="task-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
    <div class="modal-header">
      <span class="modal-title" id="modal-title-text">New Task</span>
      <button class="modal-close" onclick="closeTaskModal()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-task-id" />
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="modal-title" placeholder="Task title" required
               oninput="notifyTyping()" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea class="textarea-input" id="modal-desc" placeholder="Optional description…" rows="3"></textarea>
      </div>
      <div class="field-row">
        <div class="form-group" style="margin-bottom:0">
          <label>Priority</label>
          <select class="select-input" id="modal-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>Status</label>
          <select class="select-input" id="modal-status">
            <option value="backlog">Backlog</option>
            <option value="todo">To Do</option>
            <option value="progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-top:14px">
        <label>Due Date</label>
        <input type="date" id="modal-due" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-danger btn-sm" id="modal-delete-btn" onclick="deleteCurrentTask()" style="display:none;margin-right:auto">Delete</button>
      <button class="btn btn-primary btn-sm" id="modal-save-btn" onclick="saveTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- ── New Project Modal ───────────────────────────────────────── -->
<div class="modal-backdrop" id="project-modal">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <span class="modal-title">New Project</span>
      <button class="modal-close" onclick="closeProjectModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" id="new-project-name" placeholder="My awesome project" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeProjectModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<!-- ── Toast Container ────────────────────────────────────────── -->
<div class="toast-container" id="toasts"></div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Socket.io client -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<!-- App logic -->
<script src="static/app.js"></script>
</body>
</html>
